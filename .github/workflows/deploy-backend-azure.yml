name: Deploy Backend to Azure

on:
  push:
    branches:
      - main
    paths:
      - "Backend/aspnet-core/**"
      - ".github/workflows/deploy-backend-azure.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-azure
  cancel-in-progress: true

env:
  AZURE_ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  AZURE_WEBAPP_NAME: ${{ vars.AZURE_WEBAPP_NAME }}
  IMAGE_NAME: fintex-backend

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate Azure deployment settings
        shell: bash
        run: |
          test -n "${AZURE_ACR_NAME}" || (echo "Missing repo variable AZURE_ACR_NAME" && exit 1)
          test -n "${AZURE_WEBAPP_NAME}" || (echo "Missing repo variable AZURE_WEBAPP_NAME" && exit 1)
          test -n "${{ secrets.AZURE_CLIENT_ID }}" || (echo "Missing secret AZURE_CLIENT_ID" && exit 1)
          test -n "${{ secrets.AZURE_TENANT_ID }}" || (echo "Missing secret AZURE_TENANT_ID" && exit 1)
          test -n "${{ secrets.AZURE_SUBSCRIPTION_ID }}" || (echo "Missing secret AZURE_SUBSCRIPTION_ID" && exit 1)

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve Azure Container Registry login server
        id: acr
        shell: bash
        run: |
          echo "login_server=$(az acr show --name "${AZURE_ACR_NAME}" --query loginServer --output tsv)" >> "$GITHUB_OUTPUT"

      - name: Log in to Azure Container Registry
        shell: bash
        run: az acr login --name "${AZURE_ACR_NAME}"

      - name: Build backend container image
        shell: bash
        run: |
          docker build \
            --file Backend/aspnet-core/src/Fintex.Web.Host/Dockerfile \
            --tag "${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${GITHUB_SHA}" \
            --tag "${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:latest" \
            Backend/aspnet-core

      - name: Push backend container image
        shell: bash
        run: |
          docker push "${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:${GITHUB_SHA}"
          docker push "${{ steps.acr.outputs.login_server }}/${IMAGE_NAME}:latest"

      - name: Deploy container image to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ steps.acr.outputs.login_server }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
