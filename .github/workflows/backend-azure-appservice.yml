name: Backend CI/CD to Azure App Service

on:
  push:
    branches:
      - master
      - dev
    paths:
      - "Backend/aspnet-core/**"
      - ".github/workflows/backend-azure-appservice.yml"
  pull_request:
    branches:
      - master
      - dev
    paths:
      - "Backend/aspnet-core/**"
      - ".github/workflows/backend-azure-appservice.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-azure-${{ github.ref }}
  cancel-in-progress: true

env:
  SOLUTION_PATH: Backend/aspnet-core/Fintex.sln
  PROJECT_PATH: Backend/aspnet-core/src/Fintex.Web.Host/Fintex.Web.Host.csproj
  PUBLISH_OUTPUT: Backend/aspnet-core/publish

jobs:
  build:
    name: Build Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION_PATH }} --configuration Release --no-restore

      - name: Publish Web Host
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_OUTPUT }}

      - name: Upload Publish Artifact
        uses: actions/upload-artifact@v4
        with:
          name: fintex-backend-publish
          path: ${{ env.PUBLISH_OUTPUT }}

  deploy:
    name: Deploy to Azure App Service
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev')
    environment: production
    steps:
      - name: Download Publish Artifact
        uses: actions/download-artifact@v4
        with:
          name: fintex-backend-publish
          path: ${{ env.PUBLISH_OUTPUT }}

      - name: Validate Azure deployment configuration
        run: |
          if [ -z "${{ vars.AZURE_WEBAPP_NAME }}" ] && [ -z "${{ secrets.AZURE_WEBAPP_NAME }}" ]; then
            echo "::error::Missing AZURE_WEBAPP_NAME. Add it as a GitHub Variable (recommended) or Secret."
            exit 1
          fi
          if [ -z "${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}" ]; then
            echo "::error::Missing AZURE_WEBAPP_PUBLISH_PROFILE secret. Download publish profile from Azure App Service and add it to GitHub Secrets."
            exit 1
          fi

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME || secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_OUTPUT }}
