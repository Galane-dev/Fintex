name: CI - Lint

on:
  push:
    branches:
      - master
      - dev
    paths:
      - "Backend/aspnet-core/**"
      - "Frontend/nextjs/**"
      - ".github/workflows/**"
  pull_request:
    branches:
      - master
      - dev
    paths:
      - "Backend/aspnet-core/**"
      - "Frontend/nextjs/**"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_PATH: Frontend/nextjs

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_PATH }}/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm ci

      - name: Run Frontend Lint
        working-directory: ${{ env.FRONTEND_PATH }}
        run: npm run lint
