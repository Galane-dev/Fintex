trigger:
  branches:
    include:
      - master
      - main
  paths:
    include:
      - Backend/aspnet-core/**
      - azure-pipelines.yml

pr:
  branches:
    include:
      - master
      - main
  paths:
    include:
      - Backend/aspnet-core/**
      - azure-pipelines.yml

variables:
  vmImageName: ubuntu-latest
  dotnetSdkVersion: 9.x
  solution: Backend/aspnet-core/Fintex.sln
  dockerfilePath: Backend/aspnet-core/src/Fintex.Web.Host/Dockerfile
  dockerBuildContext: Backend/aspnet-core
  imageRepository: fintex-backend
  tag: $(Build.BuildId)

  # Set these in Azure DevOps pipeline variables or variable groups.
  azureServiceConnection: fintex-azure-rm-sc
  acrServiceConnection: fintex-acr-sc
  acrLoginServer: your-acr-name.azurecr.io
  webAppName: fintex

stages:
  - stage: Validate
    displayName: Validate backend
    jobs:
      - job: backend_ci
        displayName: Restore, build, and test
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
            clean: true

          - task: UseDotNet@2
            displayName: Install .NET SDK
            inputs:
              version: $(dotnetSdkVersion)

          - task: DotNetCoreCLI@2
            displayName: Restore solution
            inputs:
              command: restore
              projects: $(solution)

          - task: DotNetCoreCLI@2
            displayName: Build solution
            inputs:
              command: build
              projects: $(solution)
              arguments: --configuration Release --no-restore

          - task: DotNetCoreCLI@2
            displayName: Run tests
            inputs:
              command: test
              projects: Backend/aspnet-core/test/**/*.csproj
              arguments: --configuration Release --no-build --logger trx

  - stage: Containerize
    displayName: Build and push container
    dependsOn: Validate
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - job: docker_build_push
        displayName: Build and push backend image
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
            clean: true

          - task: Docker@2
            displayName: Build and push image to ACR
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(acrServiceConnection)
              buildContext: $(dockerBuildContext)
              tags: |
                $(tag)
                latest

  - stage: Deploy
    displayName: Deploy to Azure Web App
    dependsOn: Containerize
    condition: and(succeeded(), ne(variables['Build.Reason'], 'PullRequest'))
    jobs:
      - deployment: deploy_backend
        displayName: Deploy backend container
        environment: production
        pool:
          vmImage: $(vmImageName)
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebAppContainer@1
                  displayName: Update Web App container image
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appName: $(webAppName)
                    containers: $(acrLoginServer)/$(imageRepository):$(tag)
